<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activities</title>
    <link rel="stylesheet" href="activities.css" />
  </head>
  <body>
    <div id="activityquestion"><b>Em muốn làm gì sau đó?</b></div>
    <div class="activities-selection">
      <div class="activity-item">
        <img src="aquarium.jpeg" alt="aquarium" />
        <label><input type="checkbox" name="activities" value="Đi thủy cung" />Đi thủy cung</label>
      </div>
      <div class="activity-item">
        <img src="arcade.jpeg" alt="arcade" />
        <label><input type="checkbox" name="activities" value="Chơi game" />Chơi game</label>
      </div>
      <div class="activity-item">
        <img src="cinema.jpeg" alt="cinema" />
        <label><input type="checkbox" name="activities" value="Xem phim" />Xem phim</label>
      </div>
      <div class="activity-item">
        <img src="keramika.jpeg" alt="ceramics" />
        <label><input type="checkbox" name="activities" value="Làm gốm" />Làm gốm</label>
      </div>
      <div class="activity-item">
        <img src="kunsthalle.jpeg" alt="kunsthalle" />
        <label><input type="checkbox" name="activities" value="Đi triển lãm" />Đi triển lãm</label>
      </div>
      <div class="activity-item">
        <img src="park.jpeg" alt="park" />
        <label><input type="checkbox" name="activities" value="Đi dạo công viên" />Đi dạo công viên</label>
      </div>
    </div>
    <button class="button" onclick="goNext()">Tiếp</button>
    <script src="db.js"></script>
    <script>
      async function goNext() {
        const checked = [...document.querySelectorAll('input[name="activities"]:checked')].map(c => c.value);
        DB.save("activities", checked);
        await DB.sendAll();
        location.href = "lastpage.html";
      }
    </script>
  </body>
</html>
