<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dessert</title>
    <link rel="stylesheet" href="dessert.css" />
  </head>
  <body>
    <div id="dessertquestion">Em muốn ăn món tráng miệng nào?</div>
    <div class="dessert-selection">
      <div class="dessert-item">
        <img src="boba.jpeg" alt="boba" />
        <label><input type="checkbox" name="dessert" value="Trà sữa" /> Trà sữa</label>
      </div>
      <div class="dessert-item">
        <img src="churro.jpeg" alt="churro" />
        <label><input type="checkbox" name="dessert" value="Bánh quy" /> Bánh quy</label>
      </div>
      <div class="dessert-item">
        <img src="che.jpeg" alt="che" />
        <label><input type="checkbox" name="dessert" value="Chè" /> Chè</label>
      </div>
      <div class="dessert-item">
        <img src="mochi.jpeg" alt="mochi" />
        <label><input type="checkbox" name="dessert" value="Mochi" /> Mochi</label>
      </div>
      <div class="dessert-item">
        <img src="randombun.jpeg" alt="randombun" />
        <label><input type="checkbox" name="dessert" value="Bánh ngọt" /> Bánh ngọt</label>
      </div>
      <div class="dessert-item">
        <img src="taiyaki.jpeg" alt="taiyaki" />
        <label><input type="checkbox" name="dessert" value="Kem" /> Kem</label>
      </div>
    </div>
    <button class="button" onclick="goNext()">Tiếp UWU</button>
    <script src="db.js"></script>
    <script>
      function goNext() {
        const checked = [...document.querySelectorAll('input[name="dessert"]:checked')].map(c => c.value);
        DB.save("dessert", checked);
        location.href = "activities.html";
      }
    </script>
  </body>
</html>
